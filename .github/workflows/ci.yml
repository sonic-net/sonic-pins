name: "build"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Bazel Build and Test

    runs-on: ubuntu-24.04
    env:
      BAZEL_CACHE_USER: github
      BAZEL_CACHE_PWD: ${{ secrets.BAZEL_CACHE_PWD }}
      BAZEL_CACHE_URL: pins-bazel-cache.onf.dev:9090

    steps:
    - uses: actions/checkout@v3

    - name: Free disk space as workaround for https://github.com/actions/runner-images/issues/2875.
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        # Keeping these as a precaution, in case we do need them.
        large-packages: false

    - name: Mount bazel cache
      uses: actions/cache/restore@v3
      with:
        # Caches both downloaded repos and compiled build outputs.
        path: "~/.cache/bazel"
        key: bazel-v4-${{ runner.os }}-${{ hashFiles('**/*_deps.bzl', 'MODULE.bazel', '.bazelrc', '.bazelversion') }}
        restore-keys: |
          bazel-v4-${{ runner.os }}-

    - name: Install system dependencies
      run: ./install_dependencies.sh

    - name: Install bazelisk
      run: |
        ARCH=$(dpkg --print-architecture)
        sudo curl -fsSL -o /usr/local/bin/bazel \
          https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-${ARCH}
        sudo chmod +x /usr/local/bin/bazel

    - name: Save start time
      uses: josStorer/get-current-time@v2
      id: start-time
      with:
        # Unix timestamp -- seconds since 1970.
        format: X

    # Authentication is enabled for R/W access for builds on main and branch PRs
    # Unauthenticated reads are allowed for PRs from forks
    - name: Build and Test
      run: |
        BAZEL_OPTS=""
        [ ! -z "$BAZEL_CACHE_USER" ] && [ ! -z "$BAZEL_CACHE_PWD" ] && \
          AUTH="${BAZEL_CACHE_USER}:${BAZEL_CACHE_PWD}@"
        BAZEL_OPTS+=" --remote_cache=https://${AUTH}${BAZEL_CACHE_URL}"
        BAZEL_OPTS+=" --remote_download_minimal"
        bazel build ${BAZEL_OPTS} //...
        bazel test ${BAZEL_OPTS} --test_timeout=60,600,900,3600 //...

    - name: Save end time
      if: always()
      uses: josStorer/get-current-time@v2
      id: end-time
      with:
        # Unix timestamp -- seconds since 1970.
        format: X

    - name: Calculate build duration
      if: always()
      run: |
        START=${{ steps.start-time.outputs.formattedTime }}
        END=${{ steps.end-time.outputs.formattedTime }}
        DURATION=$(( ${END:-0} - ${START:-0} ))
        echo "duration=$DURATION" | tee "$GITHUB_ENV"

    - name: Compress cache
      if: always()
      run: rm -rf $(bazel info repository_cache)

    - name: Save bazel cache
      uses: actions/cache/save@v3
      # Save the cache if we're on the main branch, or the build took >5min.
      # The always() call ensures this step runs even if the build was
      # cancelled (e.g. by the 6h job timeout), so partial caches are saved.
      if: always() && (github.ref_name == 'main' || env.duration > 300)
      with:
        path: "~/.cache/bazel"
        key: bazel-v4-${{ runner.os }}-${{ hashFiles('**/*_deps.bzl', 'MODULE.bazel', '.bazelrc', '.bazelversion') }}
